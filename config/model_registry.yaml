    openrouter_author: deepseek
    openrouter_slug: deepseek-v3.2

  # OR uses author "qwen" where our registry uses "alibaba"; version separator
  # also differs (registry uses 3-6-plus, OR uses 3.6-plus). Both differences
  # accepted since model lineage is clear.
  - constituent_id: alibaba/qwen-3-6-plus
    tier: TPRR_E
    provider: alibaba
    canonical_name: Qwen 3.6 Plus
    baseline_input_price_usd_mtok: 0.20
    baseline_output_price_usd_mtok: 0.80
    openrouter_author: qwen
    openrouter_slug: qwen3.6-plus

  - constituent_id: xiaomi/mimo-v2-pro
    tier: TPRR_E
    provider: xiaomi
    canonical_name: MiMo V2 Pro
    baseline_input_price_usd_mtok: 0.30
    baseline_output_price_usd_mtok: 1.10
    openrouter_author: xiaomi
    openrouter_slug: mimo-v2-pro

  # OR uses author "meta-llama" but its Llama 4 lineup (maverick, scout) is
  # an architectural-variant split — different model variants in the same
  # family, not a parameter-count + hosting variant of llama-4-70b-hosted.
  # Decision log 2026-04-27: leave Tier C absent for this constituent.
  - constituent_id: meta/llama-4-70b-hosted
    tier: TPRR_E
    provider: meta
    canonical_name: Llama 4 70B (hosted)
    baseline_input_price_usd_mtok: 0.60
    baseline_output_price_usd_mtok: 0.80
