# TPRR model registry — 16 constituents across F / S / E tiers.
#
# Tier assignments per docs/decision_log.md 2026-04-23 (refined from
# project_plan.md baseline; Sonnet 4.6 reclassified S→F, Llama 70B reclassified
# S→E, Mistral Large 3 added to S to preserve tier depth).
#
# Baseline prices anchor the mock price generator (Phase 2a). Real provider
# prices for 2026-04 era; subject to revision via decision log.
#
# openrouter_author / openrouter_slug populated per docs/decision_log.md
# 2026-04-27 ("OpenRouter coverage: 15/16 registry models mapped").
# Only meta/llama-4-70b-hosted has no OpenRouter analogue at the same
# architectural-variant granularity and intentionally leaves the
# openrouter_* fields unset; it will not contribute Tier C reference data.
#
# Schema: src/tprr/config.py :: ModelMetadata

models:

  # === Frontier (TPRR-F) — 6 constituents ===

  - constituent_id: openai/gpt-5-pro
    tier: TPRR_F
    provider: openai
    canonical_name: GPT-5 Pro
    baseline_input_price_usd_mtok: 15.00
    baseline_output_price_usd_mtok: 75.00
    openrouter_author: openai
    openrouter_slug: gpt-5-pro

  - constituent_id: openai/gpt-5
    tier: TPRR_F
    provider: openai
    canonical_name: GPT-5
    baseline_input_price_usd_mtok: 10.00
    baseline_output_price_usd_mtok: 40.00
    openrouter_author: openai
    openrouter_slug: gpt-5

  - constituent_id: anthropic/claude-opus-4-7
    tier: TPRR_F
    provider: anthropic
    canonical_name: Claude Opus 4.7
    baseline_input_price_usd_mtok: 15.00
    baseline_output_price_usd_mtok: 75.00
    openrouter_author: anthropic
    openrouter_slug: claude-opus-4.7

  - constituent_id: anthropic/claude-opus-4-6
    tier: TPRR_F
    provider: anthropic
    canonical_name: Claude Opus 4.6
    baseline_input_price_usd_mtok: 15.00
    baseline_output_price_usd_mtok: 75.00
    openrouter_author: anthropic
    openrouter_slug: claude-opus-4.6

  # OR carries gemini-3.1-pro-preview as the closest active text/reasoning
  # gemini-3 model; gemini-3-pro itself is not published. Minor-version bump
  # within the same series, same convention as gemini-2-flash -> gemini-2.5-flash.
  - constituent_id: google/gemini-3-pro
    tier: TPRR_F
    provider: google
    canonical_name: Gemini 3 Pro
    baseline_input_price_usd_mtok: 5.00
    baseline_output_price_usd_mtok: 30.00
    openrouter_author: google
    openrouter_slug: gemini-3.1-pro-preview

  - constituent_id: anthropic/claude-sonnet-4-6
    tier: TPRR_F
    provider: anthropic
    canonical_name: Claude Sonnet 4.6
    baseline_input_price_usd_mtok: 3.00
    baseline_output_price_usd_mtok: 15.00
    openrouter_author: anthropic
    openrouter_slug: claude-sonnet-4.6

  # === Standard (TPRR-S) — 4 constituents ===

  - constituent_id: openai/gpt-5-mini
    tier: TPRR_S
    provider: openai
    canonical_name: GPT-5 Mini
    baseline_input_price_usd_mtok: 0.50
    baseline_output_price_usd_mtok: 4.00
    openrouter_author: openai
    openrouter_slug: gpt-5-mini

  - constituent_id: anthropic/claude-haiku-4-5
    tier: TPRR_S
    provider: anthropic
    canonical_name: Claude Haiku 4.5
    baseline_input_price_usd_mtok: 1.00
    baseline_output_price_usd_mtok: 5.00
    openrouter_author: anthropic
    openrouter_slug: claude-haiku-4.5

  # OR's closest active Standard-tier Gemini is gemini-2.5-flash.
  - constituent_id: google/gemini-2-flash
    tier: TPRR_S
    provider: google
    canonical_name: Gemini 2 Flash
    baseline_input_price_usd_mtok: 0.30
    baseline_output_price_usd_mtok: 2.50
    openrouter_author: google
    openrouter_slug: gemini-2.5-flash

  # OR uses author "mistralai" (canonical) where our registry uses "mistral";
  # OR uses date-suffix versioning (2512 = Dec 2024 vintage of Mistral Large)
  # which corresponds to our "v3" intent. Both author convention and version
  # convention differ.
  - constituent_id: mistral/mistral-large-3
    tier: TPRR_S
    provider: mistral
    canonical_name: Mistral Large 3
    baseline_input_price_usd_mtok: 2.00
    baseline_output_price_usd_mtok: 6.00
    openrouter_author: mistralai
    openrouter_slug: mistral-large-2512

  # === Efficiency (TPRR-E) — 6 constituents ===

  - constituent_id: google/gemini-flash-lite
    tier: TPRR_E
    provider: google
    canonical_name: Gemini Flash Lite
    baseline_input_price_usd_mtok: 0.10
    baseline_output_price_usd_mtok: 0.40
    openrouter_author: google
    openrouter_slug: gemini-2.5-flash-lite

  - constituent_id: openai/gpt-5-nano
    tier: TPRR_E
    provider: openai
    canonical_name: GPT-5 Nano
