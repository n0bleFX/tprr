# Tier B revenue-derived volume proxy — quarterly provider API revenue.
#
# v0.1 covers 6 providers across 5 quarters (2025-Q1 through 2026-Q1).
# Meta (Llama) and Xiaomi (MiMo) are intentionally omitted — see decision log
# 2026-04-28 entries "Tier B revenue config: Meta + Xiaomi excluded as Tier-A-only"
# and the v0.1 universe / xAI exclusion entry.
#
# Schema: src/tprr/config.py :: TierBRevenueEntry
# Period format: YYYY-Qn (regex ^\d{4}-Q[1-4]$). Linear interpolation between
# consecutive quarterly entries; anchored to end-of-quarter dates per decision
# log 2026-04-23 ("Tier B revenue interpolation anchored to end-of-quarter").
#
# Source values:
#   reported              — directly from public earnings / SEC filings
#   analyst_triangulation — Sacra / SaaStr / The Information / similar analyst
#                           commentary cross-referenced against multiple sources
#   synthetic_for_mvp     — best-effort estimate where no analyst breakdown
#                           exists; flagged for v0.2 revisit
#
# API share assumptions (per decision log 2026-04-28 "Tier B API share
# assumptions for v0.1"):
#   openai    17%  Sacra-disclosed; reflects ChatGPT consumer revenue dominance
#   anthropic 72%  Sacra-disclosed; reflects API-first business model
#   google     8%  estimated; Cloud is mostly non-AI workloads (compute/storage/
#                  BigQuery/Workspace); Gemini API is a small slice
#   deepseek  60%  estimated; web/app free, API primary monetised stream
#   alibaba   10%  estimated; "AI revenue" reported only as triple-digit YoY
#   mistral   70%  Sacra-disclosed; API + on-prem licensing + consultancy mix

entries:

  # ===== OpenAI =====
  # Total ARR progression: $6B end-2024 → $10B Jun 2025 → $12B Jul 2025 →
  # $20-21.4B end-2025 → $25B Feb 2026. Quarterly = mid-quarter ARR / 4 × 17%.
  - provider: openai
    period: 2025-Q1
    amount_usd: 300000000
    source: analyst_triangulation
  - provider: openai
    period: 2025-Q2
    amount_usd: 440000000
    source: analyst_triangulation
  - provider: openai
    period: 2025-Q3
    amount_usd: 660000000
    source: analyst_triangulation
  - provider: openai
    period: 2025-Q4
    amount_usd: 790000000
    source: analyst_triangulation
  - provider: openai
    period: 2026-Q1
    amount_usd: 960000000
    source: analyst_triangulation

  # ===== Anthropic =====
  # ARR progression: $1B Jan 2025 → $4B Jun → $9B Dec → $19B Mar 2026.
  # Quarterly = mid-quarter ARR / 4 × 72%. API share is more directly disclosed
  # than OpenAI's; Sacra states 70-75% from API+enterprise, used 72% midpoint.
  - provider: anthropic
    period: 2025-Q1
    amount_usd: 200000000
    source: analyst_triangulation
  - provider: anthropic
    period: 2025-Q2
    amount_usd: 500000000
    source: analyst_triangulation
  - provider: anthropic
    period: 2025-Q3
    amount_usd: 1000000000
    source: analyst_triangulation
  - provider: anthropic
    period: 2025-Q4
    amount_usd: 1440000000
    source: analyst_triangulation
  - provider: anthropic
    period: 2026-Q1
    amount_usd: 2520000000
    source: analyst_triangulation

  # ===== Google (Gemini API) =====
  # Google does NOT disclose Gemini API revenue separately. Constructed from
  # Google Cloud's $70B run rate at Q1 2026 (48% YoY) extrapolated back across
  # 2025, then × 8% as Gemini API portion of Cloud. Both the 8% share and the
  # historical Cloud quarterly are estimates. v0.1 simplification.
  - provider: google
    period: 2025-Q1
    amount_usd: 940000000
    source: synthetic_for_mvp
  - provider: google
    period: 2025-Q2
    amount_usd: 1060000000
    source: synthetic_for_mvp
  - provider: google
    period: 2025-Q3
    amount_usd: 1180000000
    source: synthetic_for_mvp
  - provider: google
    period: 2025-Q4
    amount_usd: 1280000000
    source: synthetic_for_mvp
  - provider: google
    period: 2026-Q1
    amount_usd: 1400000000
    source: synthetic_for_mvp

  # ===== DeepSeek =====
  # Total revenue $1.1B FY 2025 (140% YoY), mid-2025 ARR $220M datapoint.
  # Quarterly back-derived with linear-ish growth, then × 60% as API portion.
  # Web/app are free; API is the primary monetised stream. API/total split is
  # an estimate — no DeepSeek disclosure breaks this out.
  - provider: deepseek
    period: 2025-Q1
    amount_usd: 90000000
    source: synthetic_for_mvp
  - provider: deepseek
    period: 2025-Q2
    amount_usd: 130000000
    source: synthetic_for_mvp
  - provider: deepseek
    period: 2025-Q3
    amount_usd: 180000000
    source: synthetic_for_mvp
  - provider: deepseek
    period: 2025-Q4
    amount_usd: 260000000
    source: synthetic_for_mvp
  - provider: deepseek
    period: 2026-Q1
    amount_usd: 310000000
    source: synthetic_for_mvp

  # ===== Alibaba (Qwen) =====
  # Alibaba Cloud Q3 2025 reported $5.6B (34% YoY); Q4 2025 36% YoY. Quarterly
  # Cloud back-derived, then × 10% as Qwen-API portion of Cloud. The 10% is an
  # estimate — Alibaba's "AI revenue" is reported qualitatively as triple-digit
  # YoY growth, not as a separate line item. v0.1 simplification.
  - provider: alibaba
    period: 2025-Q1
    amount_usd: 450000000
    source: synthetic_for_mvp
  - provider: alibaba
    period: 2025-Q2
    amount_usd: 500000000
    source: synthetic_for_mvp
  - provider: alibaba
    period: 2025-Q3
    amount_usd: 560000000
    source: reported
  - provider: alibaba
    period: 2025-Q4
    amount_usd: 590000000
    source: synthetic_for_mvp
  - provider: alibaba
    period: 2026-Q1
    amount_usd: 630000000
    source: synthetic_for_mvp

  # ===== Mistral =====
  # ARR progression: $60M March 2025 → $100M Nov → $312M Dec → $400M Jan 2026.
  # Quarterly = mid-quarter ARR / 4 × 70% (API portion; Mistral revenue includes
  # on-prem licensing and consultancy too).
  - provider: mistral
    period: 2025-Q1
    amount_usd: 10000000
    source: analyst_triangulation
  - provider: mistral
    period: 2025-Q2
    amount_usd: 30000000
    source: analyst_triangulation
  - provider: mistral
    period: 2025-Q3
    amount_usd: 35000000
    source: analyst_triangulation
  - provider: mistral
    period: 2025-Q4
    amount_usd: 55000000
    source: analyst_triangulation
  - provider: mistral
    period: 2026-Q1
    amount_usd: 90000000
    source: analyst_triangulation
